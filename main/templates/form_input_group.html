<div class="sm:col-span-4">

    <label class="block text-sm font-medium leading-6 text-gray-900"
           for="{{ field.id_for_label }}">
        {{ field.label }}
    </label>

    <div class="mt-2{% if field.errors %} relative rounded-md shadow-sm{% endif %}">

        <input class="block w-full rounded-md border-0 py-1.5 shadow-sm ring-1 ring-inset focus:ring-2 focus:ring-inset sm:text-sm sm:leading-6{% if field.errors %} pr-10 text-red-900 ring-red-300 placeholder:text-red-300 focus:ring-red-500{% endif %}"
               id="{{ field.id_for_label }}"
               name="{{ field.name }}"
               type="{{ input_type }}"
               {% if field.value %}value="{{ field.value }}"{% endif %}>

        {% if field.errors %}
            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3">
                <svg class="h-5 w-5 text-red-500" xmlns="http://www.w3.org/2000/svg"
                     viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                    <path fill-rule="evenodd"
                          d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-8-5a.75.75 0 01.75.75v4.5a.75.75 0 01-1.5 0v-4.5A.75.75 0 0110 5zm0 10a1 1 0 100-2 1 1 0 000 2z"
                          clip-rule="evenodd"></path>
                </svg>
            </div>
        {% endif %}

    </div>

    {% if not help_text_hidden %}
        <p class="mt-2 text-sm text-gray-500">{{ field.help_text }}</p>
    {% endif %}

    {% include 'form_errors.html' with errors=field.errors %}

</div>
